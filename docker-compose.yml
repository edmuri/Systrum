version: "3.9"

services:

  backend:
    build: ./backend
    container_name: systrum_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/app:/app/app
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: systrum_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped